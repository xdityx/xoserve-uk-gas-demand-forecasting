name: Refresh forecasting data

on:
  schedule:
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: forecasting-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh authoritative source data
        run: python scripts/update_data.py

      - name: Regenerate recursive validation report
        run: python scripts/validate_oos.py

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Commit refreshed artifacts when changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/uk_gas_demand_daily.csv
          git add data/raw/uk_temperature_daily.csv
          git add reports/oos_results.json
          if git diff --cached --quiet; then
            echo "No source-data changes"
          else
            git commit -m "data: refresh demand, weather, and OOS results"
            git push
          fi
